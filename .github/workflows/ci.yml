name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    name: typecheck + lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run check

      # @vscode/test-cli needs a virtual display on Linux to launch the
      # Extension Development Host. xvfb-run wraps the test invocation
      # with one.
      - run: xvfb-run -a pnpm run test
